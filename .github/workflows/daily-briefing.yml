name: Daily Briefing

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC = 06:00 Israel time (adjust for DST)
  workflow_dispatch:      # allows manual trigger for testing

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python (with pip cache)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore dedup store
        uses: actions/cache@v4
        with:
          path: data/store.db
          key: store-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            store-v1-${{ runner.os }}-

      - name: Run daily briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_IMAP_PASSWORD: ${{ secrets.ZOHO_IMAP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.BRIEFING_GITHUB_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: PYTHONPATH=. python src/main.py --mode daily

      - name: Upload briefing artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-briefing-${{ github.run_id }}
          path: data/briefings/
          retention-days: 30
