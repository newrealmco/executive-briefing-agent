name: Weekly Briefing

on:
  schedule:
    - cron: '0 4 * * 0'  # Sunday 04:00 UTC = 07:00 Israel time
  workflow_dispatch:

jobs:
  run-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run weekly briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_IMAP_PASSWORD: ${{ secrets.ZOHO_IMAP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.BRIEFING_GITHUB_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: PYTHONPATH=. python src/main.py --mode weekly

      - uses: actions/upload-artifact@v4
        with:
          name: weekly-briefing-${{ github.run_id }}
          path: data/briefings/
          retention-days: 90
